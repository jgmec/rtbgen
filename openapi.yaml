openapi: 3.1.0
info:
  title: rtbgen
  description: >
    HTTP service for managing long-running OpenRTB 2.5 bid request generation tasks.
    Each active task generates `count` requests per scheduler tick, writing them as
    newline-delimited JSON (JSONL) to the configured output directory and optionally
    uploading them via SFTP.
  version: 1.0.0

servers:
  - url: https://localhost:8081
    description: Default Docker TLS endpoint
  - url: http://localhost:8080
    description: Plain HTTP (no TLS)

tags:
  - name: tasks
    description: Create, inspect, and delete generation tasks

paths:
  /tasks:
    post:
      tags: [tasks]
      summary: Create a task
      description: >
        Creates a new generation task. The initial geo anchor (`last_geo`) is resolved
        immediately: for `ip` criteria it is looked up from the MaxMind MMDB (if
        configured), for `ifa` it is a random city, and for `bbox` it is left empty
        (devices are placed on the first scheduler tick).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskRequest'
            examples:
              ip:
                summary: IP criteria
                value:
                  correlation_id: campaign-ip-001
                  start_time: "2026-04-15T08:00:00Z"
                  end_time: "2026-04-15T20:00:00Z"
                  criteria_type: ip
                  ip_address: "8.8.8.8"
                  count: 50
              ifa:
                summary: IFA criteria
                value:
                  correlation_id: campaign-ifa-001
                  start_time: "2026-04-15T08:00:00Z"
                  end_time: "2026-04-15T20:00:00Z"
                  criteria_type: ifa
                  ifa: "38400000-8cf0-11bd-b23e-10b96e40000d"
                  count: 50
              bbox:
                summary: GeoJSON bounding box criteria
                value:
                  correlation_id: campaign-geo-001
                  start_time: "2026-04-15T08:00:00Z"
                  end_time: "2026-04-15T20:00:00Z"
                  criteria_type: bbox
                  geometry:
                    type: Polygon
                    coordinates:
                      - - [-74.1, 40.5]
                        - [-73.7, 40.5]
                        - [-73.7, 40.9]
                        - [-74.1, 40.9]
                        - [-74.1, 40.5]
                  count: 100
              ip_with_sftp:
                summary: IP criteria with per-task SFTP upload
                value:
                  correlation_id: campaign-ip-sftp
                  start_time: "2026-04-15T08:00:00Z"
                  end_time: "2026-04-15T20:00:00Z"
                  criteria_type: ip
                  ip_address: "8.8.8.8"
                  count: 100
                  sftp:
                    host: sftp.example.com
                    port: 22
                    user: uploader
                    password: secret
                    dir: /uploads/campaign-ip-sftp
      responses:
        "201":
          description: Task created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        "400":
          description: Invalid request body or validation error
          content:
            text/plain:
              schema:
                type: string
              examples:
                missing_correlation_id:
                  value: "correlation_id is required"
                invalid_criteria:
                  value: "criteria_type must be one of: ip, ifa, bbox"
                missing_ip:
                  value: "ip_address required for criteria_type=ip"
                end_before_start:
                  value: "end_time must be after start_time"
        "500":
          description: Failed to persist the task
          content:
            text/plain:
              schema:
                type: string

    get:
      tags: [tasks]
      summary: List all tasks
      description: Returns all tasks, with `status` computed from the current time.
      responses:
        "200":
          description: Array of tasks (may be empty)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Task'

  /tasks/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: Task `correlation_id`
        schema:
          type: string

    get:
      tags: [tasks]
      summary: Get a task
      responses:
        "200":
          description: Task found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        "404":
          description: Task not found
          content:
            text/plain:
              schema:
                type: string
              example: "task not found"

    delete:
      tags: [tasks]
      summary: Delete a task
      description: Removes the task from the store. Does not affect already-generated output files.
      responses:
        "204":
          description: Task deleted
        "404":
          description: Task not found
          content:
            text/plain:
              schema:
                type: string
              example: "task not found"

components:
  schemas:

    CriteriaType:
      type: string
      enum: [ip, ifa, bbox]
      description: |
        Controls how device locations are generated:
        - `ip` — persistent device pool anchored to the IP's geo; each device walks ≤1 km per tick
        - `ifa` — single fixed IFA walking up to 2 km per scheduler tick
        - `bbox` — persistent device pool constrained within the GeoJSON polygon's bounding box

    TaskStatus:
      type: string
      enum: [pending, active, completed]
      description: |
        Derived from the current time relative to the task's time window:
        - `pending` — `now < start_time`
        - `active` — `start_time ≤ now ≤ end_time`
        - `completed` — `now > end_time`

    GeoJSONGeometry:
      type: object
      required: [type, coordinates]
      description: >
        GeoJSON Polygon geometry. Only the `Polygon` type is supported.
        Coordinates follow the GeoJSON spec: `[longitude, latitude]`.
        The exterior ring must be closed (first and last point identical).
      properties:
        type:
          type: string
          enum: [Polygon]
        coordinates:
          type: array
          description: Array of rings; first element is the exterior ring.
          items:
            type: array
            items:
              type: array
              minItems: 2
              maxItems: 2
              items:
                type: number
              description: "[longitude, latitude]"
      example:
        type: Polygon
        coordinates:
          - - [-74.1, 40.5]
            - [-73.7, 40.5]
            - [-73.7, 40.9]
            - [-74.1, 40.9]
            - [-74.1, 40.5]

    Geo:
      type: object
      description: >
        Device geographic location. Fields are populated from the MaxMind MMDB at
        task creation (for `ip` criteria) and then overwritten by Nominatim reverse
        geocoding on each scheduler tick (if `-nominatim-url` is configured).
      properties:
        lat:
          type: number
          format: double
          description: Latitude in decimal degrees
        lon:
          type: number
          format: double
          description: Longitude in decimal degrees
        type:
          type: integer
          description: "Location source: 1=GPS, 2=IP address, 3=user-provided"
          enum: [1, 2, 3]
        country:
          type: string
          description: ISO 3166-1 alpha-2 country code (e.g. `US`)
        region:
          type: string
          description: ISO 3166-2 region/subdivision code (e.g. `FL`)
        city:
          type: string
        zip:
          type: string
          description: Postal code
        utcoffset:
          type: integer
          description: >
            Device local UTC offset in minutes (DST-aware). Set only when
            `-tzf-url` is configured.

    SFTPConfig:
      type: object
      required: [host, user, password]
      description: >
        SFTP upload target for this task's output. Overrides the global default
        configured via server flags. Tasks sharing the same SFTP config
        (host + port + user + dir) are bundled into one zip per tick.
      properties:
        host:
          type: string
          description: SFTP server hostname
        port:
          type: integer
          default: 22
          description: SFTP server port
        user:
          type: string
        password:
          type: string
        dir:
          type: string
          default: /
          description: Remote directory to upload into

    CreateTaskRequest:
      type: object
      required: [correlation_id, start_time, end_time, criteria_type, count]
      properties:
        correlation_id:
          type: string
          description: Unique task identifier. Also used as the file name prefix for output JSONL files.
        start_time:
          type: string
          format: date-time
          description: ISO 8601 timestamp — task becomes active at this time
        end_time:
          type: string
          format: date-time
          description: ISO 8601 timestamp — task stops generating after this time; must be after `start_time`
        criteria_type:
          $ref: '#/components/schemas/CriteriaType'
        ip_address:
          type: string
          description: Required when `criteria_type=ip`. IPv4 or IPv6 address used to anchor the device pool.
          example: "8.8.8.8"
        ifa:
          type: string
          description: Required when `criteria_type=ifa`. Fixed IFA (UUID) used in all generated requests.
          example: "38400000-8cf0-11bd-b23e-10b96e40000d"
        geometry:
          $ref: '#/components/schemas/GeoJSONGeometry'
          description: Required when `criteria_type=bbox`. GeoJSON Polygon defining the area.
        count:
          type: integer
          minimum: 1
          description: Number of bid requests to generate per scheduler tick.
        sftp:
          $ref: '#/components/schemas/SFTPConfig'
          description: Optional per-task SFTP override. Omit to use the global server default.

    Task:
      type: object
      description: A persisted generation task as returned by the API.
      properties:
        correlation_id:
          type: string
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
        criteria_type:
          $ref: '#/components/schemas/CriteriaType'
        ip_address:
          type: string
        ifa:
          type: string
        geometry:
          $ref: '#/components/schemas/GeoJSONGeometry'
        count:
          type: integer
        status:
          $ref: '#/components/schemas/TaskStatus'
        created_at:
          type: string
          format: date-time
        last_geo:
          $ref: '#/components/schemas/Geo'
          description: >
            Most recently persisted geo position. For `ip`/`ifa` tasks this is
            updated after each scheduler tick. For `bbox` tasks it is null.
        devices:
          type: object
          description: >
            Persistent device pool for `ip` and `bbox` tasks. Keys are IFA strings;
            values are each device's last known geo position. Populated on the first
            scheduler tick and persisted across restarts.
          additionalProperties:
            $ref: '#/components/schemas/Geo'
        sftp:
          $ref: '#/components/schemas/SFTPConfig'
