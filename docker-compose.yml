services:
  tzf-server:
    image: ringsaturn/tzf-server:v0.13.6
    ports:
      - "${TZF_PORT}:8080"
    restart: unless-stopped

  rtbgen:
    build: .
    env_file: .env
    ports:
      - "${PORT}:8080"
    volumes:
      - ./data:/app/data
      - ${TLS_CERT_PATH}:/app/certs/server.crt:ro
      - ${TLS_KEY_PATH}:/app/certs/server.key:ro
    command:
      - -port=8080
      - -tasks-file=${TASKS_FILE}
      - -out-dir=${OUT_DIR}
      - -scheduler-interval=${SCHEDULER_INTERVAL}
      - -mmdb=${MMDB_PATH}
      - -nominatim-url=${NOMINATIM_URL}
      - -tzf-url=${TZF_URL}
      - -tls-cert=/app/certs/server.crt
      - -tls-key=/app/certs/server.key
      - -sftp-host=${SFTP_HOST}
      - -sftp-port=${SFTP_PORT}
      - -sftp-user=${SFTP_USER}
      - -sftp-password=${SFTP_PASSWORD}
      - -sftp-dir=${SFTP_DIR}
      - -bbox=${BBOX_MAX_LAT},${BBOX_MAX_LON},${BBOX_MIN_LAT},${BBOX_MIN_LON}
    restart: unless-stopped
    depends_on:
      - tzf-server
    extra_hosts:
      - "host.docker.internal:host-gateway"
